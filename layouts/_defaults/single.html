{{ define "main" }}
<article class="about-content" style="display: block; max-width: 800px; margin: 0 auto;">
    <h1 class="hero-title" style="font-size: 2.5rem; color: var(--accent-green);">{{ .Title }}</h1>
    <div style="color: var(--text-muted); margin-bottom: 2rem;">
        <i class="fas fa-calendar"></i> {{ .Date.Format "02/01/2006" }}
    </div>
    <div class="about-text" style="font-family: var(--font-primary); color: var(--text-secondary);">
        {{ .Content }}
    </div>
</article>
{{ end }}
