{{ define "main" }}
<h2 class="section-title"><i class="fas fa-terminal"></i> Registros del Sistema</h2>

<div class="posts-container" style="max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 3rem;">
    {{ range .Pages }}
    
    <div class="post-card" style="background: var(--bg-card); border: 1px solid var(--border-color); border-left: 4px solid var(--accent-green); border-radius: 8px; padding: 2rem; position: relative; transition: all 0.3s ease; box-shadow: var(--shadow-md);">
        
        <div style="position: absolute; top: 0; right: 0; background: var(--accent-green); color: var(--bg-primary); padding: 0.2rem 0.8rem; font-size: 0.8rem; font-family: var(--font-mono); font-weight: bold; border-bottom-left-radius: 8px;">
            SYS_LOG
        </div>

        <div class="card-header" style="margin-bottom: 1rem; margin-top: 0.5rem; display: flex; flex-direction: column; align-items: flex-start; gap: 0.5rem;">
            <h3 style="font-size: 1.6rem; margin: 0;">
                <a href="{{ .Permalink }}" style="color: var(--text-primary); text-decoration: none; transition: color 0.2s ease;" onmouseover="this.style.color='var(--accent-green)'" onmouseout="this.style.color='var(--text-primary)'">
                    {{ .Title }}
                </a>
            </h3>
            <div style="color: var(--text-muted); font-size: 0.9rem; font-family: var(--font-mono);">
                <i class="fas fa-clock"></i> {{ .Date.Format "02/01/2006" }}
            </div>
        </div>
        
        <p style="color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.6;">
            {{ .Summary }}
        </p>
        
        <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem; flex-wrap: wrap; gap: 1rem;">
            
            <div class="card-tags" style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                {{ range .Params.tags }}
                <span class="tag" style="font-size: 0.75rem; background: rgba(0, 255, 65, 0.1); border: 1px solid var(--accent-green); color: var(--accent-green); padding: 0.3rem 0.6rem; border-radius: 4px; font-family: var(--font-mono);">
                    #{{ . }}
                </span>
                {{ end }}
            </div>
            
            <a href="{{ .Permalink }}" class="btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem; border-radius: 4px; text-decoration: none; border: 1px solid var(--accent-green); color: var(--accent-green); transition: all 0.3s ease;" onmouseover="this.style.background='var(--accent-green)'; this.style.color='var(--bg-primary)';" onmouseout="this.style.background='transparent'; this.style.color='var(--accent-green)';">
                Leer registro_
            </a>
            
        </div>
    </div>
    {{ end }}
</div>
{{ end }}
